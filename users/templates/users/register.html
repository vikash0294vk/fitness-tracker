{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center pt-5">
    <div class="col-md-5">
        <div class="strava-card p-5 mt-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-uppercase" style="letter-spacing: -0.5px;">Join Fit Track</h3>
                <p class="text-muted small">Start your fitness journey today</p>
            </div>
            <form method="POST">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-4 pt-3">
                    <button class="btn btn-primary btn-lg border-0" type="submit" style="font-size: 1.1rem;">Sign Up</button>
                </div>
            </form>
            <div class="text-center mt-4 border-top pt-3">
                <small class="text-muted fw-bold">Already have an account? <a href="{% url 'login' %}" style="color: var(--brand-orange); text-decoration: none;">Log In</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
